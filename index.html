<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LaLaLa Books Ultimate STABLE</title>

<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
:root { --accent:#27ae60; --bg:#0d0d0d; --pane-bg:#161616; --text:#e0e0e0;}

body{
background:var(--bg);
color:var(--text);
font-family:"MS Mincho","Hiragino Mincho ProN",serif;
display:flex;
height:100vh;
margin:0;
overflow:hidden;
}

.pane{
height:100vh;
display:flex;
flex-direction:column;
border-right:1px solid #333;
box-sizing:border-box;
}

#master-editor{width:35%;background:var(--pane-bg);padding:20px;overflow-y:auto;}
#tate-preview{width:35%;padding:20px;align-items:center;}
#yoko-preview{width:30%;padding:20px;align-items:center;border-right:none;}

label{
display:block;
font-weight:bold;
margin:15px 0 5px;
color:var(--accent);
font-family:sans-serif;
font-size:0.85em;
}

input,textarea{
width:100%;
background:#222;
border:1px solid #444;
color:#fff;
padding:12px;
border-radius:8px;
box-sizing:border-box;
font-size:1em;
}

#main-input{height:500px;line-height:1.8;}

.phone-frame{
background:white;
border:12px solid #222;
border-radius:40px;
color:#333;
box-shadow:0 30px 60px rgba(0,0,0,0.8);
display:flex;
flex-direction:column;
overflow:hidden;
}

#frame-tate{width:450px;height:75vh;}
#frame-yoko{width:300px;height:75vh;}

.content-area{
padding:30px;
box-sizing:border-box;
outline:none;
min-height:100%;
}

#view-tate{
writing-mode:vertical-rl;
height:100%;
overflow-x:auto;
line-height:2.2;
font-size:1.1em;
}

#view-yoko{
writing-mode:horizontal-tb;
overflow-y:auto;
line-height:1.9;
font-size:1em;
text-align:justify;
}

#cover-zone{
width:260px;
height:400px;
position:relative;
margin:0 auto 20px;
border-radius:10px;
overflow:hidden;
background:#000;
}

#c-img{
width:100%;
height:100%;
object-fit:cover;
}

#c-overlay{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:20px;
background:rgba(0,0,0,0.3);
}

#c-title{
color:#fff;
font-size:1.4em;
font-weight:bold;
text-align:center;
}

#c-desc{
color:#fff;
font-size:0.75em;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:5px;
}

.toc-container{
background:#f0f0f0;
padding:10px;
border-radius:8px;
margin-bottom:20px;
font-size:0.8em;
font-family:sans-serif;
max-height:150px;
overflow-y:auto;
color:#333;
}

.toc-link{
color:var(--accent);
cursor:pointer;
display:block;
margin:4px 0;
text-decoration:underline;
}

.btn-shoot{
background:var(--accent);
color:white;
padding:18px;
border:none;
border-radius:50px;
font-weight:bold;
cursor:pointer;
width:100%;
font-size:1.1em;
margin-top:20px;
}
</style>
</head>

<body>

<div id="master-editor" class="pane">

<h2 style="color:var(--accent)">MASTER STABLE</h2>

<label>表紙画像</label>
<input type="file" id="f-cover" accept="image/*">

<label>タイトル</label>
<input type="text" id="f-title" value="タイトル">

<label>あらすじ</label>
<textarea id="f-desc"></textarea>

<label>本文</label>
<textarea id="main-input"></textarea>

<button class="btn-shoot" onclick="exportWord()">Word出力</button>

</div>

<div id="tate-preview" class="pane">

<div id="cover-zone">
<img id="c-img">
<div id="c-overlay">
<div id="c-title"></div>
<div id="c-desc"></div>
</div>
</div>

<div class="phone-frame" id="frame-tate">
<div id="view-tate" class="content-area" contenteditable="true"></div>
</div>

</div>

<div id="yoko-preview" class="pane">

<div id="toc-yoko" class="toc-container"></div>

<div class="phone-frame" id="frame-yoko">
<div id="view-yoko" class="content-area" contenteditable="true"></div>
</div>

</div>

<script>

const el=id=>document.getElementById(id)

const chapterRegex=/^(第[0-9一二三四五六七八九十百]+章|序章|終章|エピローグ|プロローグ)/

function exportWord(){

const title=el("f-title").value
const desc=el("f-desc").value
const content=el("main-input").value

const lines=content.split("\n")

let children=[]

children.push(
new docx.Paragraph({
children:[new docx.TextRun({text:title,bold:true})],
heading:docx.HeadingLevel.TITLE,
alignment:docx.AlignmentType.CENTER
})
)

children.push(
new docx.Paragraph({
children:[new docx.TextRun(desc)]
})
)

children.push(new docx.Paragraph({pageBreakBefore:true}))

children.push(
new docx.Paragraph({
children:[new docx.TextRun({text:"目次",bold:true})],
heading:docx.HeadingLevel.HEADING_1
})
)

lines.forEach(line=>{
if(chapterRegex.test(line)){
children.push(
new docx.Paragraph({
children:[new docx.TextRun("▶ "+line)]
})
)
}
})

children.push(new docx.Paragraph({pageBreakBefore:true}))

let chapterCount=0

lines.forEach(line=>{

if(chapterRegex.test(line)){

children.push(
new docx.Paragraph({
heading:docx.HeadingLevel.HEADING_1,
pageBreakBefore:chapterCount!==0,
children:[new docx.TextRun({text:line,bold:true})]
})
)

chapterCount++

}else{

children.push(
new docx.Paragraph({
children:[new docx.TextRun(line||" ")],
spacing:{line:360}
})
)

}

})

const doc=new docx.Document({

sections:[{

children:children,

footers:{

default:new docx.Footer({

children:[

new docx.Paragraph({

alignment:docx.AlignmentType.CENTER,

children:[

new docx.TextRun("Page "),
new docx.TextRun({children:[docx.PageNumber.CURRENT]}),
new docx.TextRun(" / "),
new docx.TextRun({children:[docx.PageNumber.TOTAL_PAGES]})

]

})

]

})

}

}]

})

docx.Packer.toBlob(doc).then(blob=>{

saveAs(blob,title+".docx")

})

}

</script>

</body>
</html>
