<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LaLaLa Books 目次エディション</title>

<script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://unpkg.com/docx-preview/dist/docx-preview.js"></script>

<style>
body{
    background:#1a1a1a;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

textarea{
    width:80%;
    height:300px;
    background:#222;
    color:white;
    border:1px solid #444;
    padding:10px;
}

button{
    background:#27ae60;
    color:white;
    padding:18px 40px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin:10px;
}

#preview{
    width:80%;
    margin:auto;
    background:white;
    color:black;
    padding:40px;
    margin-top:40px;
}
</style>

</head>

<body>

<h2>🏛️ LaLaLa Books 目次ジャンプ・エンジン</h2>
<p>本文を貼り付け → プレビュー → Word生成</p>

<textarea id="body">
第1章　運命の石

夜の街は静かだった。

第2章　逆転

その瞬間、すべてが変わった。
</textarea>

<br>

<button onclick="preview()">📖 プレビュー</button>
<button onclick="download()">📄 Word生成</button>

<div id="preview"></div>

<script>

function createDocument(){

const bodyText = document.getElementById("body").value;

const paragraphs = bodyText.split("\n").map(line => {

    if(line.startsWith("第") && line.includes("章")){
        return new docx.Paragraph({
            text: line,
            heading: docx.HeadingLevel.HEADING_1
        });
    }

    return new docx.Paragraph({
        text: line,
        spacing:{ line:360 }
    });

});

const doc = new docx.Document({

sections:[{

children:[

new docx.Paragraph({
text:"逆転のラスト・ダイヤモンド",
heading:docx.HeadingLevel.TITLE,
alignment:docx.AlignmentType.CENTER
}),

new docx.Paragraph({
text:"著者：LaLaLa",
alignment:docx.AlignmentType.CENTER
}),

new docx.Paragraph({
text:"",
pageBreakBefore:true
}),

new docx.Paragraph({
text:"目次",
heading:docx.HeadingLevel.HEADING_1,
alignment:docx.AlignmentType.CENTER
}),

new docx.TableOfContents("目次",{
hyperlink:true,
headingStyleRange:"1-3"
}),

new docx.Paragraph({
text:"",
pageBreakBefore:true
}),

...paragraphs

]

}]

});

return doc;

}

async function preview(){

const doc = createDocument();
const blob = await docx.Packer.toBlob(doc);
const arrayBuffer = await blob.arrayBuffer();

const container = document.getElementById("preview");
container.innerHTML="";

await docx.renderAsync(arrayBuffer,container);

}

async function download(){

const doc = createDocument();
const blob = await docx.Packer.toBlob(doc);

saveAs(blob,"逆転のラスト・ダイヤモンド_目次付.docx");

alert("Wordファイルをダウンロードしました");

}

</script>

</body>
</html>
