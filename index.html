<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>LaLaLa Books - 阿寒湖編エディター</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        #editor-pane { width: 60%; padding: 20px; overflow-y: auto; border-right: 2px solid #333; }
        #preview-pane { width: 40%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #27ae60; }
        input, textarea { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; }
        textarea { height: 150px; }
        #main-body { height: 300px; }
        .btn-shoot { background: #27ae60; color: white; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.2em; margin-top: 20px; transition: 0.3s; }
        .btn-shoot:hover { background: #2ecc71; transform: scale(1.02); }
        
        /* スマホ型プレビュー */
        #phone-frame { width: 320px; height: 640px; background: white; border: 12px solid #333; border-radius: 30px; overflow-y: scroll; color: #333; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #phone-content { padding: 20px; font-size: 0.9em; line-height: 1.6; }
        #preview-cover { width: 100%; height: auto; border-radius: 5px; margin-bottom: 15px; display: none; }
        .preview-title { font-size: 1.4em; font-weight: bold; text-align: center; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="editor-pane">
    <h2>🏛️ 阿寒湖編・統合エディター</h2>
    
    <div class="input-group">
        <label>1. 表紙画像を読み込む</label>
        <input type="file" id="cover-input" accept="image/*" onchange="updatePreview()">
    </div>

    <div class="input-group">
        <label>2. タイトル</label>
        <input type="text" id="book-title" value="逆転のラスト・ダイヤモンド (阿寒湖編)" oninput="updatePreview()">
    </div>

    <div class="input-group">
        <label>3. あらすじ</label>
        <textarea id="book-desc" oninput="updatePreview()">銀座の夜から阿寒湖へ…。佐藤とレイナの新たな逆転劇が始まる。</textarea>
    </div>

    <div class="input-group">
        <label>4. 本文（ここに小説を貼り付け）</label>
        <textarea id="main-body" oninput="updatePreview()"></textarea>
    </div>

    <button class="btn-shoot" onclick="shootWord()">【目次付きWordを射出】</button>
</div>

<div id="preview-pane">
    <div id="phone-frame">
        <div id="phone-content">
            <img id="preview-cover" src="">
            <div id="preview-title-display" class="preview-title">タイトル</div>
            <p style="color:#666; font-size:0.8em;">著者：LaLaLa</p>
            <hr>
            <p><strong>【あらすじ】</strong></p>
            <div id="preview-desc-display">あらすじがここに表示されます。</div>
            <hr>
            <p style="color:blue; text-decoration:underline;">▶ 本編を読み始める（目次リンク）</p>
            <hr>
            <div id="preview-body-display" style="white-space: pre-wrap;"></div>
        </div>
    </div>
</div>

<script>
    function updatePreview() {
        document.getElementById('preview-title-display').innerText = document.getElementById('book-title').value;
        document.getElementById('preview-desc-display').innerText = document.getElementById('book-desc').value;
        document.getElementById('preview-body-display').innerText = document.getElementById('main-body').value;
        
        const file = document.getElementById('cover-input').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('preview-cover');
                img.src = e.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

    async function shootWord() {
        const title = document.getElementById('book-title').value;
        const bodyText = document.getElementById('main-body').value;
        const doc = new docx.Document({
            sections: [{
                children: [
                    new docx.Paragraph({ text: title, heading: docx.HeadingLevel.TITLE, alignment: docx.AlignmentType.CENTER }),
                    new docx.Paragraph({ text: "著者：LaLaLa", alignment: docx.AlignmentType.CENTER }),
                    new docx.Paragraph({ text: "", pageBreakBefore: true }),
                    new docx.Paragraph({ text: "目次", heading: docx.HeadingLevel.HEADING_1 }),
                    new docx.Paragraph({
                        children: [
                            new docx.InternalHyperlink({
                                child: new docx.TextRun({ text: "▶ 本編を読み始める", color: "0000FF", underline: true }),
                                anchor: "main_start"
                            })
                        ]
                    }),
                    new docx.Paragraph({ text: "", pageBreakBefore: true }),
                    new docx.Paragraph({
                        children: [ new docx.BookmarkStart("main_start"), new docx.TextRun({ text: "【本文】", bold: true }), new docx.BookmarkEnd("main_start") ]
                    }),
                    ...bodyText.split('\n').map(line => new docx.Paragraph({ text: line, spacing: { line: 400 } }))
                ]
            }]
        });
        docx.Packer.toBlob(doc).then(blob => {
            saveAs(blob, title + ".docx");
            alert("成功！読者が喜ぶ目次付きWordが射出されました。");
        });
    }
</script>
</body>
