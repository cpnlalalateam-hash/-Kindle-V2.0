<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>LaLaLa Books Ultimate - PRO</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --accent: #27ae60; --bg: #0d0d0d; --pane-bg: #161616; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: "MS Mincho", "Hiragino Mincho ProN", serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        .pane { height: 100vh; display: flex; flex-direction: column; border-right: 1px solid #333; box-sizing: border-box; }
        #master-editor { width: 35%; background: var(--pane-bg); padding: 20px; overflow-y: auto; }
        #tate-preview { width: 35%; padding: 20px; align-items: center; overflow: hidden; }
        #yoko-preview { width: 30%; padding: 20px; align-items: center; overflow: hidden; border-right: none; }
        label { display: block; font-weight: bold; margin: 15px 0 5px; color: var(--accent); font-family: sans-serif; font-size: 0.85em; }
        input, textarea { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        #main-input { height: 500px; line-height: 1.8; }
        .phone-frame { background: white; border: 12px solid #222; border-radius: 40px; color: #333; box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative; display: flex; flex-direction: column; overflow: hidden; }
        #frame-tate { width: 450px; height: 75vh; }
        #frame-yoko { width: 300px; height: 75vh; }
        .content-area { padding: 30px; box-sizing: border-box; outline: none; min-height: 100%; }
        #view-tate { writing-mode: vertical-rl; height: 100%; width: 100%; overflow-x: auto; line-height: 2.2; font-size: 1.1em; }
        #view-yoko { writing-mode: horizontal-tb; width: 100%; overflow-y: auto; line-height: 1.9; font-size: 1em; text-align: justify; }
        #cover-zone { width: 260px; height: 400px; position: relative; margin: 0 auto 20px; border-radius: 10px; overflow: hidden; background: #000; flex-shrink: 0; }
        #c-img { width: 100%; height: 100%; object-fit: cover; }
        #c-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; background: rgba(0,0,0,0.2); z-index: 10; pointer-events: none; }
        #c-title { color: #fff; font-size: 1.4em; font-weight: bold; text-align: center; text-shadow: 2px 2px 8px #000; }
        #c-desc { color: #fff; font-size: 0.75em; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; line-height: 1.4; }
        .toc-container { background: #f0f0f0; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.8em; font-family: sans-serif; max-height: 150px; overflow-y: auto; color: #333; }
        .toc-link { color: var(--accent); cursor: pointer; display: block; margin: 4px 0; text-decoration: underline; }
        .btn-shoot { background: var(--accent); color: white; padding: 18px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1em; margin-top: 20px; }
    </style>
</head>
<body>

<div id="master-editor" class="pane">
    <h2 style="color:var(--accent); margin:0;">🏛️ ULTIMATE ENGINE</h2>
    <label>1. 表紙画像(ArrayBuffer対応)</label>
    <input type="file" id="f-cover" accept="image/*" onchange="sync('image')">
    <label>2. タイトル</label>
    <input type="text" id="f-title" value="逆転のラスト・ダイヤモンド (阿寒湖編)" oninput="sync('master')">
    <label>3. あらすじ</label>
    <textarea id="f-desc" oninput="sync('master')">銀座の夜から阿寒湖へ…。佐藤とレイナの新たな逆転劇。</textarea>
    <label>4. 本文 (全同期・直接修正可)</label>
    <textarea id="main-input" oninput="sync('master')" placeholder="ここに執筆してください..."></textarea>
    <button class="btn-shoot" onclick="exportWord()">【プロ出版仕様Wordを射出】</button>
</div>

<div id="tate-preview" class="pane">
    <div id="cover-zone">
        <img id="c-img">
        <div id="c-overlay"><div id="c-title"></div><div id="c-desc"></div></div>
    </div>
    <div class="phone-frame" id="frame-tate">
        <div id="view-tate" class="content-area" contenteditable="true" oninput="sync('tate')"></div>
    </div>
</div>

<div id="yoko-preview" class="pane">
    <div id="toc-yoko" class="toc-container"></div>
    <div class="phone-frame" id="frame-yoko">
        <div id="view-yoko" class="content-area" contenteditable="true" oninput="sync('yoko')"></div>
    </div>
</div>

<script>
    const el = (id) => document.getElementById(id);

    function sync(source) {
        let content = "";
        const title = el('f-title').value;
        const desc = el('f-desc').value;

        if (source === 'master') content = el('main-input').value;
        else if (source === 'tate') content = el('view-tate').innerText;
        else if (source === 'yoko') content = el('view-yoko').innerText;

        if (source !== 'master') el('main-input').value = content;
        
        const lines = content.split('\n');
        let chapters = [];
        let htmlBody = lines.map((line, i) => {
            if (line.includes('章') || (line.length > 0 && line.length < 20 && (lines[i-1] === '' || i === 0))) {
                const id = `ch-${i}`;
                chapters.push({ title: line, id: id });
                return `<b id="${id}" style="color:var(--accent); font-size:1.2em;">${line}</b>`;
            }
            return line;
        }).join('<br>');

        el('toc-yoko').innerHTML = `<strong>目次</strong>` + chapters.map(ch => `<a class="toc-link" onclick="jump('${ch.id}')">▶ ${ch.title}</a>`).join('');

        if (source !== 'tate') el('view-tate').innerHTML = `<h2 style="margin-left:40px">${title}</h2><hr>${htmlBody}`;
        if (source !== 'yoko') el('view-yoko').innerHTML = `<h3 style="text-align:center">${title}</h3><hr>${htmlBody}`;
        
        el('c-title').innerText = title;
        el('c-desc').innerText = desc;

        if (source === 'image') {
            const file = el('f-cover').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => el('c-img').src = e.target.result;
                reader.readAsDataURL(file);
            }
        }
    }

    function jump(id) {
        const t = el('view-tate').querySelector(`#${id}`);
        const y = el('view-yoko').querySelector(`#${id}`);
        if (t) t.scrollIntoView({ behavior: 'smooth', inline: 'start' });
        if (y) y.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // LaLaLaさん修正：ArrayBufferで取得
    async function getCoverImage() {
        const file = el('f-cover').files[0];
        if (!file) return null;
        return await file.arrayBuffer();
    }

    async function exportWord() {
        const title = el('f-title').value;
        const desc = el('f-desc').value;
        const content = el('main-input').value;
        const coverData = await getCoverImage();
        const lines = content.split('\n');
        
        let docChildren = [];

        // 1. 表紙画像（自動判別）
        if (coverData) {
            docChildren.push(new docx.Paragraph({
                alignment: docx.AlignmentType.CENTER,
                children: [new docx.ImageRun({
                    data: coverData,
                    transformation: { width: 400, height: 600 }
                })]
            }));
        }

        // 2. タイトル・著者
        docChildren.push(new docx.Paragraph({ text: title, heading: docx.HeadingLevel.TITLE, alignment: docx.AlignmentType.CENTER }));
        docChildren.push(new docx.Paragraph({ text: `著者：LaLaLa`, alignment: docx.AlignmentType.CENTER }));
        docChildren.push(new docx.Paragraph({ text: "", spacing: { before: 400 } }));
        
        // 3. あらすじ（正しい太字指定）
        docChildren.push(new docx.Paragraph({
            children: [new docx.TextRun({ text: "【あらすじ】", bold: true })]
        }));
        docChildren.push(new docx.Paragraph({ text: desc }));
        docChildren.push(new docx.Paragraph({ text: "", pageBreakBefore: true }));

        // 4. 目次リンク
        docChildren.push(new docx.Paragraph({ text: "目次", heading: docx.HeadingLevel.HEADING_1 }));
        let chapters = [];
        lines.forEach((line, i) => {
            if (line.includes('章') || (line.length > 0 && line.length < 20 && (lines[i-1] === '' || i === 0))) {
                chapters.push({ title: line, bookmark: `ref_${i}` });
            }
        });

        chapters.forEach(ch => {
            docChildren.push(new docx.Paragraph({
                children: [new docx.InternalHyperlink({
                    anchor: ch.bookmark,
                    children: [new docx.TextRun({ text: `▶ ${ch.title}`, color: "0000FF", underline: {} })]
                })]
            }));
        });
        docChildren.push(new docx.Paragraph({ text: "", pageBreakBefore: true }));

        // 5. 本文
        lines.forEach((line, i) => {
            const ch = chapters.find(c => c.bookmark === `ref_${i}`);
            if (ch) {
                docChildren.push(new docx.Paragraph({
                    heading: docx.HeadingLevel.HEADING_1,
                    children: [new docx.BookmarkStart(ch.bookmark), new docx.TextRun({ text: line, bold: true }), new docx.BookmarkEnd(ch.bookmark)]
                }));
            } else {
                docChildren.push(new docx.Paragraph({ text: line, spacing: { line: 400 } }));
            }
        });

        try {
            // 互換性フラグをON
            const doc = new docx.Document({ compatibility: true, sections: [{ children: docChildren }] });
            const blob = await docx.Packer.toBlob(doc);
            saveAs(blob, `${title}_PRO.docx`);
            alert("【プロ出版仕様】射出完了！");
        } catch (e) {
            alert("Word生成エラー: " + e);
        }
    }
    sync('master');
</script>
</body>
</html>
