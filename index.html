<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>LaLaLa Books - 阿寒湖編 Ultimate</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #d0d0d0; font-family: "MS Mincho", "Hiragino Mincho ProN", serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 左：入力エリア */
        #editor-pane { width: 40%; padding: 25px; overflow-y: auto; border-right: 2px solid #27ae60; background: #151515; box-sizing: border-box; }
        
        /* 右：プレビューエリア */
        #preview-pane { width: 60%; background: #000; display: flex; flex-direction: row; justify-content: space-around; align-items: center; padding: 10px; overflow-x: auto; box-sizing: border-box; gap: 20px; }
        
        label { display: block; font-weight: bold; margin: 15px 0 5px; color: #27ae60; font-family: sans-serif; font-size: 0.9em; }
        input, textarea { width: 100%; background: #222; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; }
        #main-body { height: 450px; line-height: 1.8; font-size: 1.1em; }
        
        .btn-shoot { background: #27ae60; color: white; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1em; margin-top: 20px; transition: 0.3s; }
        
        /* スマホフレーム */
        .phone-frame { background: white; border: 10px solid #222; border-radius: 35px; color: #222; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; flex-shrink: 0; }
        .content-scroll { padding: 25px; height: 100%; overflow-y: auto; box-sizing: border-box; }

        /* 横書き：幅を絞って読ませる */
        #phone-yoko { width: 300px; height: 580px; }
        #display-yoko { writing-mode: horizontal-tb; line-height: 1.9; font-size: 0.95em; text-align: justify; }

        /* 縦書き：本来の情緒 */
        #phone-tate { width: 420px; height: 580px; }
        #display-tate { writing-mode: vertical-rl; line-height: 2.2; font-size: 1em; padding: 40px 30px; }

        /* 目次スタイル */
        .toc-box { background: #f9f9f9; padding: 10px; border-radius: 5px; border: 1px solid #eee; font-size: 0.85em; margin: 15px 0; font-family: sans-serif; }
        .toc-item { color: #27ae60; text-decoration: underline; cursor: pointer; margin-bottom: 5px; display: block; }

        /* 表紙合成（チェック用） */
        #cover-preview { width: 280px; height: 450px; position: relative; border-radius: 10px; overflow: hidden; background: #333; flex-shrink: 0; }
        #c-img { width: 100%; height: 100%; object-fit: cover; }
        #c-title { position: absolute; top: 15%; width: 100%; text-align: center; color: #fff; font-size: 1.5em; font-weight: bold; text-shadow: 2px 2px 10px #000; padding: 0 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="editor-pane">
    <h2 style="color:#27ae60; margin:0;">🏛️ 阿寒湖編・統合エンジン</h2>
    <label>1. 表紙(チェック用)</label>
    <input type="file" id="f-cover" accept="image/*" onchange="update()">
    <label>2. タイトル</label>
    <input type="text" id="f-title" value="逆転のラスト・ダイヤモンド (阿寒湖編)" oninput="update()">
    <label>3. あらすじ</label>
    <textarea id="f-desc" oninput="update()">銀座の夜から阿寒湖へ…。佐藤とレイナの新たな逆転劇。</textarea>
    <label>4. 本文 (一行空けで新章と認識)</label>
    <textarea id="f-body" oninput="update()" placeholder="ここに小説を貼り付けてください..."></textarea>
    <button class="btn-shoot" onclick="shootWord()">【目次付きWordを射出】</button>
</div>

<div id="preview-pane">
    <div id="cover-preview">
        <img id="c-img" src="">
        <div id="c-title"></div>
    </div>

    <div class="phone-frame" id="phone-tate">
        <div id="display-tate" class="content-scroll"></div>
    </div>

    <div class="phone-frame" id="phone-yoko">
        <div id="display-yoko" class="content-scroll"></div>
    </div>
</div>

<script>
    function update() {
        const title = document.getElementById('f-title').value;
        const body = document.getElementById('f-body').value;
        
        // 目次自動生成（空行後の「第○章」などを想定）
        let tocHtml = '<div class="toc-box"><strong>目次 (プレビュー)</strong>';
        const lines = body.split('\n');
        lines.forEach((line, i) => {
            if(line.includes('章') || (line.length > 0 && line.length < 15 && lines[i-1] === '')) {
                tocHtml += `<span class="toc-item">▶ ${line}</span>`;
            }
        });
        tocHtml += '</div>';

        // 表紙・縦・横 反映
        document.getElementById('c-title').innerText = title;
        const fullContent = `<h3>${title}</h3>${tocHtml}<hr>${body.replace(/\n/g, '<br>')}`;
        document.getElementById('display-yoko').innerHTML = fullContent;
        document.getElementById('display-tate').innerHTML = `<h2 style="margin-left:20px">${title}</h2><hr>${body.replace(/\n/g, '<br>')}`;

        const file = document.getElementById('f-cover').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('c-img').src = e.target.result; };
            reader.readAsDataURL(file);
        }
    }

    async function shootWord() {
        const title = document.getElementById('f-title').value;
        const body = document.getElementById('f-body').value;
        const doc = new docx.Document({
            sections: [{
                children: [
                    new docx.Paragraph({ text: title, heading: docx.HeadingLevel.TITLE, alignment: docx.AlignmentType.CENTER }),
                    new docx.Paragraph({ text: "", pageBreakBefore: true }),
                    new docx.Paragraph({ text: "【本文】", bold: true }),
                    ...body.split('\n').map(l => new docx.Paragraph({ text: l, spacing: { line: 400 } }))
                ]
            }]
        });
        docx.Packer.toBlob(doc).then(blob => { saveAs(blob, title + ".docx"); alert("射出完了！"); });
    }
</script>
</body>
</html>
